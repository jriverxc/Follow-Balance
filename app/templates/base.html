<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Follow Balance{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ request.url_for('static', path='logo.png') }}" />
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/tailwind.css') }}" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-5xl px-4 py-8 md:py-16">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
